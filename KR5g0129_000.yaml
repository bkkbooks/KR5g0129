front:
  text: 洞真太上八素真經精耀三景妙訣通一
  hash: sha256:3962fb9dce8a52bc59e1122d76eac8aa0c51d5349871ed59c03c7d3f432d2e54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0129_HFL_000-001a, image: hfl/1028/1028-004.png}
body:
  text: 服北斗九星法服五方五星法服北斗九星法日月之明謂之光星辰之精謂之耀總曰七曜統曰二景景者明精之象也緣象得明含明納耀長生不死號三景之人升虛入景與真為一變化自在與真合同上聖所祕慎莫妄傳常以正月四月七月十月四孟之月上旬九日平旦又以二月五月八月十一月四仲之中旬十九日之正中又以三月六月九月十二月四季之下旬二十九日之夜半一月一日三過行之平旦中及夜平及夜至旦夜及旦至中一年三十六過應三百六十度之數以五為盈氣為餘也至行日時清嚴入室燒香精思臨目閉氣叩齒九通存見九星宫府神君威容端正侍衛畟然第一陽明神人吐青氣之光第二隂精神人吐黑氣之光第三真人神人吐黃氣之光第四玄冥神人吐赤氣之光第五丹元神人吐白氣之光第六北極神人吐緑氣之光第七天關神人吐絳氣之光第八輔星神人吐碧氣之光第九弼星神人吐玄氣之光九氣各從星中下吐兆口中隨次而吐極氣吞之旡極微微通細細吐故氣仍漸漸納新氣九色咽之都竟叩齒九通坐卧行息動靜適人如此九年九皇神君降受兆訣長生不死上升三天結友衆真與道合同矣服五方五星法西太白星南熒惑星中鎮星北辰星東歲星常以五王之日六丁之時精嚴入室燒香存神臨目閉氣叩齒二十五通咽液二十五過和心平氣正身靜止見歲星青氣熒惑赤氣太白白氣辰星黑氣鎮星黃氣各在其方鬱鬱瑛瑛氛氲相繞五色混合皎皎明明冠天洞地布滿四方中映兆身內外同浹良久體暖香氣芬芳乃向王方先咽王氣次咽相生周遍乃止咽各依王數東九南八維三西六北五都畢又叩齒二十五通咽液二十五過習之五年五帝提携遊宴玉亰永成真人矣凡服日月北斗五星光精之氣不得多言不得過勞不得怠逸不得喜怒不得髙聲不得妄知他事不得干求尊卑不得偏枯獨立不得混雜非儕不得自稱有道不得說其學方不得急望速驗不得疑惑神明不得捨巳逐物不得制物順身不得負違二象不得乖伐三尊雖修餘戒習諸律科不得此㫖玄靈不矜不降不祐不效不成成道之資在乎此訣上學之侣諦奉施行凡尊三景稱三景弟子巳度三人委付師友已後傳授得稱三景法師先生真人隨師所命朋友所薦乃得稱之未經表奏不得妄稱妄稱大名苟貪尊號考重罰深三宥不赦有犯急謝首向青童改革先弊依按師言不得又犯三犯旡原復數謝勞而罪增精學之士明加詳慎凡受道之士貴在不死修行有效保得長生生生不絶乃成真聖聖基行化化教後生迷者不從哀之不捨反迷順正慰之彌勤慈獎順者不生厭倦悲念不從元起忿嗔嗔之責語先觀其心可者假善以感之不可藏懟以和之和之不使其怨怨則更致其咎多感之必令其進退則逸福得福獨學無功不能成德太古無事其愆自少不須功贖精思守靜不相往來皆得真道中古以來有事轉紛仇舋既積急宜立功損已救物存道誦經從師敢懈日夜專心心身運役苦不辭勞避惡之勢驚若探湯就善之慊如渴趣飲世塞則暫存獨立世通則永申博濟危不可扶逍遙而去哀之在心念之無巳衰可救者殷勤經營抑引取與歙張察時喜怒賞罰黜陟隨時運時有可否聖真有行藏自非至精莫能了此粗淺末學以僞稱真強小行大不識塞通亂不知避妄欲立功禍至不悟圖成反敗或有不悔持禍作福或有晚悔無所復追輪回五苦良深可痛上學志士明加研詳化身化物必度才能無以蚊虻負山不可敗後方悟大小各有妙法量力隨次修之皆從師訣不可任心心如猴猿又似熛火不可執制不可把持自非師君安能使正正又由己巳半師半兩半為一乃得成真巳無師有亦不能回巳有師無亦不能化化回變易去故就新捨惡入善練僞成真真師之功真質之德功和合永與道同也凡志欲學道恥於師人竊盜經書買贖戒律不解玄誥隨意行之或不從聖典率性為善善實善矣善實不充偏為小善不成大德魔來壞之遂陷邪黨與道永隔徒勞學名不得學實此又可悲如斯之流急宜攺悔早覺可救晚則難成學者自省省已及人人雖難知知之以法法察興居觀其內外心身可解虛實可明除虛獎實功德有徴矣洞真太上八素真經精耀三景妙訣
